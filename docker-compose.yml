# docker-compose.yml
# The Hub CRM — local stack (MongoDB + API + Vite web)
#
# DB_NAME here must match the database in MONGODB_URI below (default hub_crm for new local installs).
# For a volume that was created against another DB name, update both URI and DB_NAME or you will see empty data.
#
# Usage:
#   docker-compose up           # start all services
#   docker-compose up mongodb   # MongoDB only (run API/web natively)
#   docker-compose down -v      # stop and wipe volumes

version: '3.9'

services:

  mongodb:
    image: mongo:7.0
    container_name: hub-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: hub
      MONGO_INITDB_ROOT_PASSWORD: hub_local
      MONGO_INITDB_DATABASE: hub_crm
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile.dev
    container_name: hub-api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: mongodb://hub:hub_local@mongodb:27017/hub_crm?authSource=admin
      DB_NAME: hub_crm
      JWT_SECRET: ${JWT_SECRET:-local_dev_secret_change_in_production_minimum_32_chars}
      CLIENT_URL: http://localhost:5173
      SUPER_ADMIN_EMAILS: admin@hubonlewis.com
    volumes:
      - ./packages/api/src:/app/packages/api/src:ro
      - ./packages/shared/src:/app/packages/shared/src:ro
      - ./packages/api/uploads:/app/packages/api/uploads
    command: npm run dev --workspace=packages/api

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile.dev
    container_name: hub-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001/api
    volumes:
      - ./packages/web/src:/app/packages/web/src:ro
      - ./packages/shared/src:/app/packages/shared/src:ro

volumes:
  mongodb_data:
    name: hub_mongodb_data
