# render.yaml — The Hub CRM (HuB on Lewis)
#
# One-time manual setup (Dashboard prompts on first Blueprint apply):
#   • MONGODB_URI — MongoDB Atlas connection string (only required secret)
#   • SEED_ADMIN_PASSWORD — first-login password (only when DB has zero users)
#
# Everything else is wired here: JWT auto-generated, CORS + VITE API URLs derived
# from service names, team emails, health checks, and first-admin bootstrap.
#
# Alpha service URLs:
#   • Web service name: The-Hub → https://The-Hub.onrender.com
#   • API service name: The-Hub-Api → https://The-Hub-Api.onrender.com
# Render may normalize public URL slugs to lowercase:
#   • https://the-hub.onrender.com
#   • https://the-hub-api.onrender.com
#
# Custom domains later: set CLIENT_URL and VITE_API_URL explicitly on both services.
#
# Apply: Render Dashboard → New → Blueprint → connect repo → select this file.

envVarGroups:
  - name: hub-crm-platform
    envVars:
      - key: DB_NAME
        value: hub_crm
      - key: RENDER_ONRENDER_ROOT
        value: onrender.com
      - key: HUB_API_SERVICE_NAME
        value: The-Hub-Api
      - key: HUB_WEB_SERVICE_NAME
        value: The-Hub
      - key: SUPER_ADMIN_EMAILS
        value: jason@hubonlewis.com,hannah@hubonlewis.com,jaden@hubonlewis.com
      - key: SEED_ADMIN_EMAIL
        value: jason@hubonlewis.com
      - key: SEED_ADMIN_NAME
        value: Jason Lavender
      - key: SEED_ADMIN_ENTITY
        value: HUB
      - key: SEED_ADMIN_LOCATION
        value: Wichita
      - key: SEED_ADMIN_TENANT_ID
        value: hub-wichita
      - key: ATTACHMENT_STORAGE_DRIVER
        value: local

services:

  - type: web
    name: The-Hub-Api
    runtime: node
    region: oregon
    plan: starter

    rootDir: .

    buildCommand: >-
      npm install --include=dev
      && npm run build --workspace=packages/shared
      && npm run build --workspace=packages/api

    startCommand: npm run start --workspace=packages/api

    preDeployCommand: node scripts/render-bootstrap-admin.mjs

    healthCheckPath: /health

    envVars:
      - fromGroup: hub-crm-platform

      - key: NODE_ENV
        value: production

      - key: JWT_SECRET
        generateValue: true

      - key: MONGODB_URI
        sync: false

      - key: SEED_ADMIN_PASSWORD
        sync: false

      # Browser origins allowed for CORS (comma-separated, exact match on Origin header)
      - key: CORS_ORIGINS
        value: https://admin.hubonlewis.com,https://the-hub-qy8a.onrender.com,http://localhost:5173,http://127.0.0.1:5173

      # Legacy — optional; merged with CORS_ORIGINS when set (supports comma-separated)
      # - key: CLIENT_URL
      #   sync: false

      # Optional integrations (no-op when unset)
      - key: MAILCHIMP_API_KEY
        sync: false
      - key: MAILCHIMP_SERVER_PREFIX
        value: us21
      - key: MAILCHIMP_AUDIENCE_ID
        sync: false

  - type: web
    name: The-Hub
    runtime: static
    rootDir: .

    buildCommand: npm install --include=dev && node scripts/render-prepare-web-build.mjs

    staticPublishPath: packages/web/dist

    envVars:
      - fromGroup: hub-crm-platform

      # Required — baked into static bundle at build time (must end with /api)
      - key: VITE_API_URL
        value: https://the-hub-api.onrender.com/api

      # Optional — override when API uses a custom domain (e.g. https://api.hubonlewis.com/api)

      - key: VITE_GA_MEASUREMENT_ID
        sync: false

      # Client-safe production defaults (legacy modules off)
      - key: VITE_FEATURE_BOOKINGS
        value: "false"
      - key: VITE_FEATURE_FULFILLMENT
        value: "false"
      - key: VITE_FEATURE_CLOSEOUT
        value: "false"
      - key: VITE_FEATURE_BUILDS
        value: "false"
      - key: VITE_FEATURE_LEGACY_IMPORTS_UI
        value: "false"

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
